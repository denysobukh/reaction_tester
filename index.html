<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reaction Time Tester</title>
  <!-- Bootstrap 5 (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    :root {
      --square-size: min(70vmin, 520px);
      --yellow: #ffc107; /* Bootstrap warning */
      --green:  #28a745; /* Bootstrap success (slightly tweaked) */
      --red:    #dc3545; /* Bootstrap danger */
    }
    html, body { height: 100%; background: #fff; }
    .square {
      width: var(--square-size);
      aspect-ratio: 1 / 1; /* keeps it a square on all screens */
      border-radius: 1.25rem;
      box-shadow: 0 .5rem 1.5rem rgba(0,0,0,.15);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation; /* prevents double-tap zoom on iOS */
      display: grid;
      place-items: center;
      transition: background-color .15s ease-in-out, transform .08s ease-in-out;
    }
    .square:active { transform: scale(.995); }
    .square.yellow { background: var(--yellow); }
    .square.green  { background: var(--green); }
    .square.red    { background: var(--red); }

    .mono { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <main class="container-fluid h-100 d-flex flex-column justify-content-center align-items-center gap-3 py-4">
    <div id="square" class="square yellow" role="button" aria-label="Reaction square"></div>

    <div class="text-center" style="min-height: 3lh;">
      <div id="message" class="lead fw-semibold">Wait for green… then tap.</div>
      <div id="result" class="fs-2 fw-bold mono"></div>
      <div id="status" class="text-muted small" aria-live="polite"></div>
    </div>
  </main>

  <script>
    (function() {
      // States: 'waiting' (yellow, delay running), 'ready' (green, timer running),
      // 'penalty' (red, too soon), 'cooldown' (after result/penalty before restart)
      let state = 'waiting';
      let delayTimer = null;   // timeout until turning green
      let cooldownTimer = null;// timeout until resetting to yellow after tap/penalty
      let startTs = 0;         // performance.now() when turned green

      const square  = document.getElementById('square');
      const message = document.getElementById('message');
      const result  = document.getElementById('result');
      const status  = document.getElementById('status');

      function randDelayMs(min=1000, max=10000) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function clearTimers() {
        if (delayTimer)   { clearTimeout(delayTimer); delayTimer = null; }
        if (cooldownTimer){ clearTimeout(cooldownTimer); cooldownTimer = null; }
      }

      function setSquareColor(cls) {
        square.classList.remove('yellow','green','red');
        square.classList.add(cls);
      }

      function scheduleGreen() {
        clearTimers();
        state = 'waiting';
        setSquareColor('yellow');
        result.textContent = '';
        message.textContent = 'Wait for green… then tap.';
        const delay = randDelayMs(1000, 10000);
        status.textContent = '';
        delayTimer = setTimeout(() => {
          state = 'ready';
          setSquareColor('green');
          message.textContent = 'GO! Tap now';
          startTs = performance.now();
        }, delay);
      }

      function handleTooSoon() {
        clearTimers();
        state = 'penalty';
        setSquareColor('red');
        message.textContent = 'Too soon!';
        status.textContent = 'Penalty: wait 3 seconds…';
        cooldownTimer = setTimeout(() => {
          scheduleGreen();
        }, 3000);
      }

      function handleSuccess() {
        if (state !== 'ready') return; // guard
        const ms = Math.max(0, Math.round(performance.now() - startTs));
        result.textContent = ms + ' ms';
        message.textContent = 'Nice. Restarting…';
        status.textContent = 'Reset in 3 seconds';
        state = 'cooldown';
        // Keep it green during the display window, then restart
        cooldownTimer = setTimeout(() => {
          scheduleGreen();
        }, 3000);
      }

      // Unified pointer handler (mouse + touch + pen)
      function onPointerDown(ev) {
        // Prevent generating both pointer and click on some browsers
        ev.preventDefault();
        if (state === 'waiting') {
          handleTooSoon();
        } else if (state === 'ready') {
          handleSuccess();
        } else {
          // Ignore taps during penalty/cooldown
        }
      }

      // Safety: if tab loses focus, reset cleanly
      window.addEventListener('blur', () => {
        clearTimers();
        scheduleGreen();
      });

      // Attach once; using pointer events covers desktop & mobile
      square.addEventListener('pointerdown', onPointerDown, { passive: false });

      // Kick off first round
      scheduleGreen();
    })();
  </script>
</body>
</html>
